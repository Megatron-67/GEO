<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>IPTrace — Geolocation Finder</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@300;400;500&family=Instrument+Sans:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#f4f3ef;
  --surface:#ffffff;
  --surface2:#f8f7f4;
  --border:#e2e0d8;
  --border2:#cccac0;
  --ink:#1a1916;
  --ink2:#4a4840;
  --ink3:#8a8680;
  --accent:#1a56ff;
  --accent-bg:#eef2ff;
  --green:#0a7a4a;
  --green-bg:#e6f7f0;
  --red:#c0392b;
  --red-bg:#fdecea;
  --amber:#b45309;
  --amber-bg:#fef3e2;
  --shadow-sm:0 1px 3px rgba(0,0,0,.07),0 1px 2px rgba(0,0,0,.05);
  --shadow-md:0 4px 12px rgba(0,0,0,.08),0 2px 4px rgba(0,0,0,.05);
  --shadow-lg:0 12px 32px rgba(0,0,0,.1),0 4px 8px rgba(0,0,0,.06);
  --font-sans:'Instrument Sans',sans-serif;
  --font-mono:'Geist Mono',monospace;
  --sidebar:360px;
  --radius:12px;
}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--ink);font-family:var(--font-sans);display:flex;flex-direction:column}

/* Header */
header{
  height:56px;background:var(--surface);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 20px;gap:12px;flex-shrink:0;
  box-shadow:var(--shadow-sm);z-index:100;
}
.logo{display:flex;align-items:center;gap:8px;font-weight:700;font-size:16px;letter-spacing:-.3px;color:var(--ink)}
.logo-dot{
  width:28px;height:28px;border-radius:8px;background:var(--accent);
  display:flex;align-items:center;justify-content:center;font-size:13px;color:#fff;flex-shrink:0;
}
.logo-sub{font-size:12px;color:var(--ink3);font-weight:400;margin-left:2px;font-family:var(--font-mono)}
.h-space{flex:1}
.header-badge{
  font-family:var(--font-mono);font-size:11px;color:var(--ink3);
  border:1px solid var(--border2);border-radius:6px;padding:3px 10px;background:var(--surface2);
}

/* Layout */
.main{flex:1;display:flex;overflow:hidden}

/* Sidebar */
.sidebar{
  width:var(--sidebar);min-width:var(--sidebar);
  background:var(--surface);border-right:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;z-index:10;
}

/* Search */
.search-box{padding:16px;border-bottom:1px solid var(--border);flex-shrink:0}
.search-label{font-size:11px;font-weight:600;letter-spacing:.06em;color:var(--ink3);text-transform:uppercase;margin-bottom:8px}
.search-row{display:flex;gap:8px}
.ip-input{
  flex:1;background:var(--surface2);border:1.5px solid var(--border);border-radius:9px;
  padding:9px 13px;font-family:var(--font-mono);font-size:13px;color:var(--ink);
  outline:none;transition:border-color .15s,box-shadow .15s;
}
.ip-input::placeholder{color:var(--ink3)}
.ip-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(26,86,255,.1)}
.track-btn{
  background:var(--accent);color:#fff;border:none;border-radius:9px;
  padding:9px 16px;font-family:var(--font-sans);font-weight:600;font-size:13px;
  cursor:pointer;transition:background .15s,transform .1s,box-shadow .15s;
  white-space:nowrap;box-shadow:0 2px 8px rgba(26,86,255,.3);
}
.track-btn:hover{background:#0040dd;box-shadow:0 4px 14px rgba(26,86,255,.4)}
.track-btn:active{transform:scale(.97)}
.track-btn:disabled{background:#a0aec0;cursor:not-allowed;box-shadow:none}
.secondary-row{display:flex;gap:6px;margin-top:8px}
.btn-sm{
  flex:1;background:var(--surface2);border:1.5px solid var(--border);border-radius:8px;
  padding:7px 10px;font-family:var(--font-sans);font-size:12px;font-weight:500;
  color:var(--ink2);cursor:pointer;transition:border-color .15s,background .15s,color .15s;
  display:flex;align-items:center;justify-content:center;gap:5px;
}
.btn-sm:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-bg)}

/* Results */
.results{flex:1;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--border2) transparent}

/* Empty */
.empty-state{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:100%;gap:10px;color:var(--ink3);text-align:center;padding:32px;
}
.empty-icon{font-size:42px;opacity:.35;margin-bottom:4px}
.empty-title{font-weight:600;font-size:15px;color:var(--ink2)}
.empty-body{font-size:13px;line-height:1.6;max-width:210px}

/* Loader */
.loading-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:180px;gap:12px;color:var(--ink3)}
.spinner{width:28px;height:28px;border:2.5px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Error */
.error-card{
  margin:16px;background:var(--red-bg);border:1.5px solid #f5c6c2;
  border-radius:var(--radius);padding:14px 16px;color:var(--red);
  font-size:13px;line-height:1.5;display:flex;gap:10px;align-items:flex-start;
}

/* Result content */
.result-content{padding:14px 16px;display:flex;flex-direction:column;gap:14px}

/* IP Hero */
.ip-hero{
  background:linear-gradient(135deg,#1a56ff 0%,#0a35c4 100%);
  border-radius:var(--radius);padding:18px 18px 14px;color:#fff;
  position:relative;overflow:hidden;box-shadow:0 4px 20px rgba(26,86,255,.35);
}
.ip-hero::before{content:'';position:absolute;top:-30px;right:-30px;width:100px;height:100px;border-radius:50%;background:rgba(255,255,255,.07)}
.ip-hero::after{content:'';position:absolute;bottom:-20px;left:60px;width:70px;height:70px;border-radius:50%;background:rgba(255,255,255,.05)}
.ip-hero-label{font-size:10px;font-weight:600;letter-spacing:.1em;opacity:.7;text-transform:uppercase;font-family:var(--font-mono);margin-bottom:6px}
.ip-hero-addr{font-family:var(--font-mono);font-size:22px;font-weight:500;letter-spacing:1px;word-break:break-all;line-height:1.2}
.ip-hero-bottom{display:flex;align-items:center;justify-content:space-between;margin-top:12px}
.ip-hero-country{font-size:13px;opacity:.85;display:flex;align-items:center;gap:5px}
.copy-btn{
  background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);
  color:#fff;border-radius:7px;padding:5px 10px;font-size:11px;font-weight:600;
  cursor:pointer;transition:background .15s;display:flex;align-items:center;gap:4px;
  font-family:var(--font-sans);
}
.copy-btn:hover{background:rgba(255,255,255,.28)}
.copy-btn.copied{background:rgba(0,255,100,.2);border-color:rgba(0,255,100,.4)}

/* Section title */
.section-title{
  font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
  color:var(--ink3);margin-bottom:7px;display:flex;align-items:center;gap:6px;
}
.section-title::after{content:'';flex:1;height:1px;background:var(--border)}

/* Data grid */
.data-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.data-grid.full{grid-template-columns:1fr}
.data-cell{
  background:var(--surface2);border:1.5px solid var(--border);border-radius:9px;
  padding:9px 11px;transition:border-color .15s;
}
.data-cell:hover{border-color:var(--border2)}
.dc-label{font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--ink3);margin-bottom:3px}
.dc-value{font-size:13px;font-weight:500;color:var(--ink);word-break:break-word;line-height:1.3}
.dc-value.mono{font-family:var(--font-mono);font-size:12px}
.dc-value.sm{font-size:12px}

/* Flags */
.flag-row{display:flex;gap:6px;flex-wrap:wrap}
.flag{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;letter-spacing:.02em;padding:3px 9px;border-radius:20px;border:1.5px solid}
.flag.safe{color:var(--green);background:var(--green-bg);border-color:#9de8c9}
.flag.warn{color:var(--amber);background:var(--amber-bg);border-color:#fcd6a4}
.flag.danger{color:var(--red);background:var(--red-bg);border-color:#f5c6c2}
.flag.neutral{color:var(--ink3);background:var(--surface2);border-color:var(--border2)}

/* History */
.history-section{border-top:1px solid var(--border);padding:12px 16px;flex-shrink:0}
.history-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.history-title{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--ink3)}
.clear-btn{font-size:11px;color:var(--red);background:none;border:none;cursor:pointer;font-family:var(--font-sans);font-weight:500;padding:2px 6px;border-radius:5px;transition:background .15s}
.clear-btn:hover{background:var(--red-bg)}
.history-list{display:flex;flex-direction:column;gap:4px;max-height:120px;overflow-y:auto;scrollbar-width:thin}
.history-item{
  display:flex;align-items:center;gap:8px;background:var(--surface2);border:1.5px solid var(--border);
  border-radius:7px;padding:6px 10px;cursor:pointer;transition:border-color .15s,background .15s;
}
.history-item:hover{border-color:var(--accent);background:var(--accent-bg)}
.history-ip{font-family:var(--font-mono);font-size:12px;font-weight:500;color:var(--ink);flex:1}
.history-loc{font-size:11px;color:var(--ink3);text-overflow:ellipsis;white-space:nowrap;overflow:hidden;max-width:110px}

/* Map */
.map-area{flex:1;position:relative;overflow:hidden}
#map{width:100%;height:100%}
.leaflet-container{background:#e8e4d9}

/* Custom marker */
.pin-outer{
  width:36px;height:36px;border-radius:50%;background:rgba(26,86,255,.15);
  display:flex;align-items:center;justify-content:center;
  animation:ripple 2s infinite;
}
.pin-inner{width:16px;height:16px;border-radius:50%;background:var(--accent);border:3px solid #fff;box-shadow:0 2px 8px rgba(26,86,255,.55)}
@keyframes ripple{
  0%,100%{box-shadow:0 0 0 0 rgba(26,86,255,.3)}
  50%{box-shadow:0 0 0 14px rgba(26,86,255,0)}
}

/* Map badge */
.map-badge{
  position:absolute;bottom:18px;left:16px;background:var(--surface);
  border:1.5px solid var(--border);border-radius:10px;padding:8px 14px;
  font-family:var(--font-mono);font-size:11px;color:var(--ink2);
  box-shadow:var(--shadow-md);z-index:500;pointer-events:none;line-height:1.8;
  opacity:0;transition:opacity .3s;
}
.map-badge.show{opacity:1}
.map-badge b{color:var(--accent)}

/* Toast */
.toast{
  position:fixed;top:70px;right:18px;z-index:9999;
  background:var(--ink);color:#fff;border-radius:9px;padding:10px 16px;
  font-size:13px;font-weight:500;box-shadow:var(--shadow-lg);
  transform:translateY(-8px);opacity:0;transition:transform .25s,opacity .25s;
  pointer-events:none;display:flex;align-items:center;gap:7px;
}
.toast.show{transform:translateY(0);opacity:1}

/* Responsive */
@media(max-width:680px){
  :root{--sidebar:100%}
  .main{flex-direction:column}
  .sidebar{min-width:unset;width:100%;max-height:55vh;border-right:none;border-bottom:1px solid var(--border)}
  .map-area{min-height:45vh}
}
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-dot">◎</div>
    IPTrace
    <span class="logo-sub">/ geo</span>
  </div>
  <div class="h-space"></div>
  <div class="header-badge">ip-api.com · OpenStreetMap</div>
</header>

<div class="main">
  <aside class="sidebar">

    <!-- Search -->
    <div class="search-box">
      <div class="search-label">IP Address</div>
      <div class="search-row">
        <input class="ip-input" id="ipInput" type="text" placeholder="e.g. 8.8.8.8 or 2606:4700::" maxlength="45"
          onkeydown="if(event.key==='Enter')trackIP()"/>
        <button class="track-btn" id="trackBtn" onclick="trackIP()">Track</button>
      </div>
      <div class="secondary-row">
        <button class="btn-sm" onclick="locateMe()">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/></svg>
          My IP
        </button>
        <button class="btn-sm" id="copyIpBtn" onclick="copyCurrentIP()">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          Copy IP
        </button>
      </div>
    </div>

    <!-- Results area -->
    <div class="results" id="resultsArea">
      <div class="empty-state">
        <div class="empty-icon">🌍</div>
        <div class="empty-title">No IP tracked yet</div>
        <div class="empty-body">Enter any IPv4 or IPv6 address above, or click <strong>My IP</strong> to locate yourself.</div>
      </div>
    </div>

    <!-- History -->
    <div class="history-section" id="historySection" style="display:none">
      <div class="history-header">
        <div class="history-title">Recent Searches</div>
        <button class="clear-btn" onclick="clearHistory()">Clear all</button>
      </div>
      <div class="history-list" id="historyList"></div>
    </div>

  </aside>

  <div class="map-area">
    <div id="map"></div>
    <div class="map-badge" id="mapBadge">
      LAT <b id="bLat">—</b> &nbsp; LNG <b id="bLng">—</b> &nbsp; ZOOM <b id="bZoom">—</b>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// ── Map setup ───────────────────────────────────────────────
const map = L.map('map', {zoomControl:false, attributionControl:false}).setView([20,10], 2);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom:18
}).addTo(map);

L.control.zoom({position:'bottomright'}).addTo(map);
L.control.attribution({position:'bottomright', prefix:false})
  .addAttribution('© <a href="https://openstreetmap.org/copyright">OpenStreetMap</a> · <a href="https://ip-api.com">ip-api.com</a>')
  .addTo(map);

map.on('zoomend moveend', () => {
  const z = map.getZoom();
  const c = map.getCenter();
  document.getElementById('bZoom').textContent = z;
  document.getElementById('bLat').textContent = c.lat.toFixed(4);
  document.getElementById('bLng').textContent = c.lng.toFixed(4);
});

const pinIcon = L.divIcon({
  className:'',
  html:'<div class="pin-outer"><div class="pin-inner"></div></div>',
  iconSize:[36,36], iconAnchor:[18,18],
});

let marker = null, circle = null, currentData = null;
let history = [];
try { history = JSON.parse(localStorage.getItem('iptrace_history') || '[]'); } catch(e){}

// ── Track ────────────────────────────────────────────────────
async function trackIP() {
  const ip = document.getElementById('ipInput').value.trim();
  if (!ip) { showToast('⚠️ Please enter an IP address'); return; }
  await doFetch(ip);
}

async function locateMe() {
  await doFetch('');
}

async function doFetch(ip) {
  setLoading();
  // ipwho.is — free, no key, full CORS support
  const url = ip
    ? `https://ipwho.is/${encodeURIComponent(ip)}`
    : `https://ipwho.is/`;
  try {
    const res = await fetch(url);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const raw = await res.json();

    if (!raw.success) {
      showError(raw.message || 'Lookup failed. Please check the IP address and try again.');
      return;
    }

    // Normalise ipwho.is response to match our render format
    const d = {
      query:       raw.ip,
      continent:   raw.continent,
      continentCode: raw.continent_code,
      country:     raw.country,
      countryCode: raw.country_code,
      regionName:  raw.region,
      region:      raw.region_code,
      city:        raw.city,
      district:    raw.district || '—',
      zip:         raw.postal,
      lat:         raw.latitude,
      lon:         raw.longitude,
      timezone:    raw.timezone?.id,
      offset:      raw.timezone?.offset ?? 0,
      currency:    raw.currency?.code ? `${raw.currency.code} (${raw.currency.symbol || ''})` : '—',
      isp:         raw.connection?.isp,
      org:         raw.connection?.org,
      as:          raw.connection?.asn ? `AS${raw.connection.asn}` : '—',
      asname:      raw.connection?.domain || '—',
      reverse:     '—',
      mobile:      raw.type === 'mobile',
      proxy:       raw.security?.proxy || false,
      hosting:     raw.security?.hosting || false,
    };

    currentData = d;
    renderResults(d);
    placeMarker(d);
    addToHistory(d);
    if (!ip) document.getElementById('ipInput').value = d.query;
    document.getElementById('trackBtn').disabled = false;
  } catch(e) {
    showError('Lookup failed: ' + (e.message || 'Unknown error') + '. Try saving this file locally and opening it in your browser for full functionality.');
  }
}

// ── Render ───────────────────────────────────────────────────
function renderResults(d) {
  const off = d.offset ?? 0;
  const sign = off >= 0 ? '+' : '-';
  const abs = Math.abs(off);
  const hh = String(Math.floor(abs/3600)).padStart(2,'0');
  const mm = String(Math.floor((abs%3600)/60)).padStart(2,'0');
  const utcStr = `UTC${sign}${hh}:${mm}`;

  const flags = [];
  if (d.proxy)              flags.push({l:'Proxy Detected', c:'warn',   i:'⚠'});
  if (d.hosting)            flags.push({l:'Hosting / DC',  c:'warn',   i:'⚠'});
  if (d.mobile)             flags.push({l:'Mobile Network',c:'neutral',i:'📱'});
  if (!d.proxy&&!d.hosting) flags.push({l:'Clean IP',      c:'safe',   i:'✓'});

  document.getElementById('resultsArea').innerHTML = `
  <div class="result-content">

    <div class="ip-hero">
      <div class="ip-hero-label">Tracked IP Address</div>
      <div class="ip-hero-addr">${esc(d.query)}</div>
      <div class="ip-hero-bottom">
        <div class="ip-hero-country">${flag(d.countryCode)} ${esc(d.country)}</div>
        <button class="copy-btn" onclick="copyText('${esc(d.query)}',this)">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          Copy
        </button>
      </div>
    </div>

    <div>
      <div class="section-title">Security &amp; Type</div>
      <div class="flag-row">${flags.map(f=>`<span class="flag ${f.c}">${f.i} ${f.l}</span>`).join('')}</div>
    </div>

    <div>
      <div class="section-title">Location</div>
      <div class="data-grid">
        ${cell('City', d.city)}
        ${cell('Region', d.regionName)}
        ${cell('Country', `${d.country} (${d.countryCode})`)}
        ${cell('Continent', `${d.continent} (${d.continentCode})`)}
        ${cell('Postal / ZIP', d.zip, true)}
        ${cell('District', d.district)}
      </div>
    </div>

    <div>
      <div class="section-title">Coordinates</div>
      <div class="data-grid">
        ${cell('Latitude', d.lat, true)}
        ${cell('Longitude', d.lon, true)}
      </div>
    </div>

    <div>
      <div class="section-title">Time &amp; Currency</div>
      <div class="data-grid">
        ${cell('Timezone', d.timezone)}
        ${cell('UTC Offset', utcStr, true)}
        ${cell('Currency', d.currency)}
        ${cell('Region Code', d.region, true)}
      </div>
    </div>

    <div>
      <div class="section-title">Network &amp; ISP</div>
      <div class="data-grid full">
        ${cell('ISP', d.isp)}
        ${cell('Organization', d.org)}
        ${cell('AS Number', d.as, true)}
        ${cell('AS Name', d.asname)}
        ${cell('Reverse DNS', d.reverse, true)}
        ${cell('Connection Type', d.mobile ? '📱 Mobile' : '🖥 Fixed')}
      </div>
    </div>

  </div>`;
}

function cell(label, val, mono) {
  const v = val ? String(val) : '—';
  return `<div class="data-cell"><div class="dc-label">${label}</div><div class="dc-value${mono?' mono':''}">${esc(v)}</div></div>`;
}

// ── Map ──────────────────────────────────────────────────────
function placeMarker(d) {
  if (marker) map.removeLayer(marker);
  if (circle) map.removeLayer(circle);
  const ll = [d.lat, d.lon];
  circle = L.circle(ll, {radius:40000, color:'#1a56ff', fillColor:'#1a56ff', fillOpacity:.06, weight:1.5, opacity:.35}).addTo(map);
  marker = L.marker(ll, {icon:pinIcon}).addTo(map);
  marker.bindPopup(`<b style="font-family:monospace;font-size:13px">${d.query}</b><br>${[d.city,d.country].filter(Boolean).join(', ')}`);
  map.flyTo(ll, 10, {animate:true, duration:1.8, easeLinearity:.3});
  document.getElementById('mapBadge').classList.add('show');
  document.getElementById('bLat').textContent = d.lat.toFixed(4);
  document.getElementById('bLng').textContent = d.lon.toFixed(4);
  document.getElementById('bZoom').textContent = 10;
}

// ── History ──────────────────────────────────────────────────
function addToHistory(d) {
  history = history.filter(h=>h.ip!==d.query);
  history.unshift({ip:d.query, loc:[d.city,d.country].filter(Boolean).join(', ')});
  if (history.length>8) history.pop();
  try { localStorage.setItem('iptrace_history', JSON.stringify(history)); } catch(e){}
  renderHistory();
}

function renderHistory() {
  const sec = document.getElementById('historySection');
  const list = document.getElementById('historyList');
  if (!history.length) { sec.style.display='none'; return; }
  sec.style.display='';
  list.innerHTML = history.map(h=>`
    <div class="history-item" onclick="loadHistory('${esc(h.ip)}')">
      <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="var(--ink3)" stroke-width="2.3"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/></svg>
      <span class="history-ip">${esc(h.ip)}</span>
      <span class="history-loc">${esc(h.loc)}</span>
    </div>`).join('');
}

function loadHistory(ip) {
  document.getElementById('ipInput').value = ip;
  doFetch(ip);
}

function clearHistory() {
  history = [];
  try { localStorage.removeItem('iptrace_history'); } catch(e){}
  renderHistory();
  showToast('🗑 History cleared');
}

// ── Copy ─────────────────────────────────────────────────────
function copyText(text, btn) {
  navigator.clipboard.writeText(text).then(()=>{
    if (btn) {
      const orig = btn.innerHTML;
      btn.innerHTML='✓ Copied';
      btn.classList.add('copied');
      setTimeout(()=>{ btn.innerHTML=orig; btn.classList.remove('copied'); },1800);
    }
    showToast('📋 Copied to clipboard');
  });
}

function copyCurrentIP() {
  if (!currentData) { showToast('⚠️ Track an IP first'); return; }
  navigator.clipboard.writeText(currentData.query).then(()=>{
    const btn = document.getElementById('copyIpBtn');
    btn.style.borderColor='var(--accent)';btn.style.color='var(--accent)';btn.style.background='var(--accent-bg)';
    setTimeout(()=>{ btn.style.borderColor='';btn.style.color='';btn.style.background=''; },1600);
    showToast('📋 ' + currentData.query + ' copied!');
  });
}

// ── Helpers ──────────────────────────────────────────────────
function setLoading() {
  document.getElementById('trackBtn').disabled = true;
  document.getElementById('resultsArea').innerHTML = `
    <div class="loading-state">
      <div class="spinner"></div>
      <span style="font-size:13px;color:var(--ink3)">Locating IP…</span>
    </div>`;
}

function showError(msg) {
  document.getElementById('trackBtn').disabled = false;
  document.getElementById('resultsArea').innerHTML = `
    <div class="error-card">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" style="flex-shrink:0;margin-top:1px"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <span>${esc(msg)}</span>
    </div>`;
}

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>t.classList.remove('show'), 2400);
}

function esc(s) {
  return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function flag(code) {
  if (!code||code.length!==2) return '🌐';
  return String.fromCodePoint(...[...code.toUpperCase()].map(c=>0x1F1E6+c.charCodeAt(0)-65));
}

// Init
renderHistory();
document.getElementById('ipInput').focus();
</script>

</html>
